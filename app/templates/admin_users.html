{% extends "base.html" %}
{% block title %}Users - Admin{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>User Management</h1>
        <p class="text-muted">Add and manage user accounts</p>
    </div>
    <button class="btn btn-primary" onclick="openAddUserModal()">+ Add User</button>
</div>

<div class="card">
    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Full Name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTable">
                <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="userModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="userModalTitle">Add User</h2>
            <button class="modal-close" onclick="closeUserModal()">&times;</button>
        </div>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName">
            </div>
            <div class="form-group">
                <label>Password <span id="pwdHint" class="text-muted">(required)</span></label>
                <input type="password" id="password">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group" id="activeGroup" style="display:none">
                <label>
                    <input type="checkbox" id="isActive" checked> Active
                </label>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeUserModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save User</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allUsers = [];

    async function loadUsers() {
        const res = await apiFetch('/api/admin/users');
        if (!res) return;
        allUsers = await res.json();
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = allUsers.map(u => `
            <tr class="${u.is_active ? '' : 'inactive-row'}">
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email}</td>
                <td>${u.full_name || '-'}</td>
                <td><span class="role-badge role-${u.role}">${u.role}</span></td>
                <td>${u.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-danger">Inactive</span>'}</td>
                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                <td>
                    <button class="btn btn-sm btn-outline" onclick="editUser(${u.id})">Edit</button>
                    ${u.is_active ? `<button class="btn btn-sm btn-danger" onclick="deactivateUser(${u.id})">Deactivate</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    function openAddUserModal() {
        document.getElementById('userModalTitle').textContent = 'Add User';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('username').disabled = false;
        document.getElementById('password').required = true;
        document.getElementById('pwdHint').textContent = '(required)';
        document.getElementById('activeGroup').style.display = 'none';
        document.getElementById('userModal').classList.remove('hidden');
    }

    function closeUserModal() {
        document.getElementById('userModal').classList.add('hidden');
    }

    function editUser(id) {
        const user = allUsers.find(u => u.id === id);
        if (!user) return;
        document.getElementById('userModalTitle').textContent = 'Edit User';
        document.getElementById('userId').value = user.id;
        document.getElementById('username').value = user.username;
        document.getElementById('username').disabled = true;
        document.getElementById('email').value = user.email;
        document.getElementById('fullName').value = user.full_name || '';
        document.getElementById('password').value = '';
        document.getElementById('password').required = false;
        document.getElementById('pwdHint').textContent = '(leave blank to keep current)';
        document.getElementById('role').value = user.role;
        document.getElementById('isActive').checked = user.is_active;
        document.getElementById('activeGroup').style.display = 'block';
        document.getElementById('userModal').classList.remove('hidden');
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;

        if (userId) {
            const payload = {
                email: document.getElementById('email').value,
                full_name: document.getElementById('fullName').value,
                role: document.getElementById('role').value,
                is_active: document.getElementById('isActive').checked,
            };
            if (password) payload.password = password;
            const res = await apiFetch(`/api/admin/users/${userId}`, { method: 'PUT', body: JSON.stringify(payload) });
            if (res && res.ok) { showToast('User updated', 'success'); closeUserModal(); loadUsers(); }
        } else {
            const payload = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                full_name: document.getElementById('fullName').value,
                password: password,
                role: document.getElementById('role').value,
            };
            const res = await apiFetch('/api/admin/users', { method: 'POST', body: JSON.stringify(payload) });
            if (res && res.ok) { showToast('User created', 'success'); closeUserModal(); loadUsers(); }
        }
    });

    async function deactivateUser(id) {
        if (!confirm('Deactivate this user?')) return;
        const res = await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        if (res && res.ok) { showToast('User deactivated', 'success'); loadUsers(); }
    }

    loadUsers();
</script>
{% endblock %}
